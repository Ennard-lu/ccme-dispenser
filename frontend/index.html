<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCME Dispenser Control Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>CCME Dispenser</h1>
            <div id="status-indicator" class="status-idle">
                <span class="status-dot"></span>
                <span id="status-text">Idle</span>
            </div>
        </header>

        <main>
            <section class="control-panel">
                <h2>Workflow Control</h2>
                <div class="input-group">
                    <label for="volume-input">Water Volume (ml):</label>
                    <input type="number" id="volume-input" min="1" max="1000" value="100" step="1">
                </div>
                <div class="button-group">
                    <button id="btn-start" class="btn btn-primary">Start</button>
                    <button id="btn-stop" class="btn btn-danger" disabled>Stop</button>
                </div>
            </section>

            <section class="info-panel">
                <h2>Progress</h2>
                <div class="info-row">
                    <span>Current Vial:</span>
                    <span id="current-vial">0</span> / <span id="total-vials">16</span>
                </div>
                <div class="info-row">
                    <span>Current State:</span>
                    <span id="current-state">idle</span>
                </div>
            </section>

            <section class="vial-grid-panel">
                <h2>Vial Matrix</h2>
                <div id="vial-grid" class="vial-grid"></div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
