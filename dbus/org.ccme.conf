<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow any user to own and communicate with CCME services -->
  <policy context="default">
    <allow own="org.ccme.Pump"/>
    <allow own="org.ccme.Stirrer"/>
    <allow own="org.ccme.Camera"/>
    <allow own="org.ccme.FMC"/>
    <allow own="org.ccme.Web"/>
    <allow own="org.ccme.Orchestrator"/>

    <allow send_destination="org.ccme.Pump"/>
    <allow send_destination="org.ccme.Stirrer"/>
    <allow send_destination="org.ccme.Camera"/>
    <allow send_destination="org.ccme.FMC"/>
    <allow send_destination="org.ccme.Web"/>
    <allow send_destination="org.ccme.Orchestrator"/>

    <allow send_interface="org.ccme.Pump.Control"/>
    <allow send_interface="org.ccme.Stirrer.Control"/>
    <allow send_interface="org.ccme.Camera.Control"/>
    <allow send_interface="org.ccme.FMC.Control"/>
    <allow send_interface="org.ccme.Web.Control"/>
    <allow send_interface="org.ccme.Orchestrator.Control"/>
  </policy>
</busconfig>
